    <form action="">
        <h1>Booking Form</h1>
        <p><label for="name">Name:</label>
        <input type="text" id="name" name="name">
        </p>
        <p><label for="email">Email:</label>
        <input type="email" id="email" name="email">
        </p>
        <p><label for="phone">Phone:</label>
        <input type="number" id="phone" name="phone">   </p>
        <p><label for="date">Date:</label>
        <input type="date" placeholder="mm/dd/yyyy" id="date" name="date"> 
        </p>
        <p><label for="time">Time:</label>
        <input type="time" placeholder="--:-- --" id="time" name="time">
        </p>
        <p>        
        <label for="guests">Number of Guests:</label>
        <input type="number" id="guests" name="number of guest">
        </p>
        <p><button>Submit</button></p>
    </form>
        <form action="">
        <h1>Car Purchase Form</h1>
        <p><label for="name">Name:</label>
        <input type="text" id="name" name="name">
        </p>
        <p><label for="email">Email:</label>
        <input type="email" id="email" name="email">
        </p>
        <p><label for="phone">Phone:</label>
        <input type="number" id="phone" name="phone">   </p>

        <p><label for="model">Choose a Car:</label>
            <select name="model" id="model">
                <option value="model1">Model 1</option>
                <option value="model2">Model 2</option>
            </select>
        </p>><label for="color">Choose a Color:</label>
            <select name="color" id="color">
                <option value="red">Red</option>
                <option value="black">Black</option>
            </select>
        </p>
        <p>        
        <label for="guests">Number of Guests:</label>
        <input type="number" id="guests" name="number of guest">
        </p>
        <p><button>Submit</button></p>
    </form>

</html>
